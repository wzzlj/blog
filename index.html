<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合约仓位计算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans p-4 md:p-8 flex justify-center items-start min-h-screen">

    <div class="bg-white rounded-xl shadow-lg p-6 w-full max-w-md">
        <h1 class="text-xl font-bold mb-6 text-gray-900 border-b pb-2">BTC/USDT 永续合约仓位计算器</h1>

        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">入场价格 (USDT)</label>
                <input type="number" id="entryPrice" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 71544" oninput="calculate()">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">止损价格 (USDT)</label>
                <input type="number" id="stopLoss" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 73005" oninput="calculate()">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">止损金额/风险承受 (USDT)</label>
                <input type="number" id="riskAmount" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如: 200" oninput="calculate()">
            </div>
        </div>

        <div id="results" class="hidden bg-gray-50 rounded-lg p-4 border border-gray-200">
            <div class="flex justify-between items-center mb-4">
                <span class="text-sm font-semibold text-gray-600">交易方向</span>
                <span id="direction" class="px-2 py-1 rounded text-sm font-bold"></span>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                    <span class="text-sm text-gray-600">仓位大小 (USDT)</span>
                    <span id="posUSDT" class="font-bold text-lg text-gray-900">0.00</span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                    <span class="text-sm text-gray-600">仓位规模 (BTC)</span>
                    <span id="posBTC" class="font-bold text-gray-900">0.0000</span>
                </div>
                <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                    <span class="text-sm text-gray-600">止损幅度</span>
                    <span id="slPercent" class="font-medium text-gray-900">0.00%</span>
                </div>
                
                <div class="pt-2">
                    <span class="text-sm font-semibold text-gray-600 block mb-2">止盈目标价位</span>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-gray-500">1:1 (盈亏比)</span>
                        <span id="tp1" class="font-medium text-green-600">0.00</span>
                    </div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-gray-500">2:1 (盈亏比)</span>
                        <span id="tp2" class="font-medium text-green-600">0.00</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs text-gray-500">3:1 (盈亏比)</span>
                        <span id="tp3" class="font-medium text-green-600">0.00</span>
                    </div>
                </div>
            </div>
            
            <div id="warning" class="mt-4 text-xs text-red-600 bg-red-50 p-2 rounded hidden">
                警告: 止损空间过窄，高杠杆易被强制平仓。
            </div>
        </div>
    </div>

    <script>
        function calculate() {
            const entryStr = document.getElementById('entryPrice').value;
            const stopStr = document.getElementById('stopLoss').value;
            const riskStr = document.getElementById('riskAmount').value;

            const entry = parseFloat(entryStr);
            const stop = parseFloat(stopStr);
            const risk = parseFloat(riskStr);

            const resultsDiv = document.getElementById('results');

            if (!isNaN(entry) && !isNaN(stop) && !isNaN(risk) && entry > 0 && stop > 0 && risk > 0 && entry !== stop) {
                resultsDiv.classList.remove('hidden');

                const isLong = entry > stop;
                const diff = Math.abs(entry - stop);
                const slPercent = diff / entry;
                
                const posUSDT = risk / slPercent;
                const posBTC = posUSDT / entry;

                let tp1, tp2, tp3;
                if (isLong) {
                    tp1 = entry + diff;
                    tp2 = entry + (diff * 2);
                    tp3 = entry + (diff * 3);
                } else {
                    tp1 = entry - diff;
                    tp2 = entry - (diff * 2);
                    tp3 = entry - (diff * 3);
                }

                // Update UI
                const dirEl = document.getElementById('direction');
                if (isLong) {
                    dirEl.textContent = '做多 (Long)';
                    dirEl.className = 'px-2 py-1 rounded text-sm font-bold bg-green-100 text-green-700';
                } else {
                    dirEl.textContent = '做空 (Short)';
                    dirEl.className = 'px-2 py-1 rounded text-sm font-bold bg-red-100 text-red-700';
                }

                document.getElementById('posUSDT').textContent = posUSDT.toFixed(2);
                document.getElementById('posBTC').textContent = posBTC.toFixed(4);
                document.getElementById('slPercent').textContent = (slPercent * 100).toFixed(2) + '%';
                
                document.getElementById('tp1').textContent = tp1.toFixed(2);
                document.getElementById('tp2').textContent = tp2.toFixed(2);
                document.getElementById('tp3').textContent = tp3.toFixed(2);

                const warningEl = document.getElementById('warning');
                if (slPercent < 0.01) { // 如果止损幅度小于1%，提示风险
                    warningEl.classList.remove('hidden');
                } else {
                    warningEl.classList.add('hidden');
                }
            } else {
                resultsDiv.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
